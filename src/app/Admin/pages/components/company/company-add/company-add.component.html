<div class="popup">
        <div class="popup-content">
    
    
                <!-- Changing Part -->
                 <div class="d-flex justify-content-between mb-3">
                  <h4>Add Company</h4>
                  <i class="ti ti-x" (click)="onClose()"></i>
                 </div>

                 <div class="container header-container">
                  <!-- <H2>Stepper</H2> -->
                  
                  <div id="stepper1" class="bs-stepper">
                    <div class="bs-stepper-header">
                      <div class="step" data-target="#test-l-1">
                        <button class="step-trigger">
                          <span class="bs-stepper-circle">1</span>
                          <span class="bs-stepper-label">Company Details</span>
                        </button>
                      </div>
                      <div class="line"></div>
                      <div class="step" data-target="#test-l-2">
                        <button class="step-trigger">
                          <span class="bs-stepper-circle">2</span>
                          <span class="bs-stepper-label">Branch Details</span>
                        </button>
                      </div>
                      <div class="line"></div>
                      <div class="step" data-target="#test-l-3">
                        <button class="step-trigger">
                          <span class="bs-stepper-circle">3</span>
                          <span class="bs-stepper-label">User Details</span>
                        </button>
                      </div>
                    </div>
                    <div class="bs-stepper-content">
                      <form  class="row g-3" (ngSubmit)="onSubmit()">
                        <div id="test-l-1" class="content">
                          <div class="form-group">
                            
                            <label for="exampleInputCompanyName" class="form-label">Company Name</label>
                            <input type="text" class="form-control mb-3" id="exampleInputCompanyName" placeholder="Enter Company Name" />

                            <label for="exampleInputCompanyType" class="form-label">Company Type</label>
                            <input type="text" class="form-control" id="exampleInputCompanyType" placeholder="Enter Company Type" />

                            
                          </div>
                          <div class="text-end">
                            <button (click)="next()" class="primary-btn">Next</button>
                          </div>
                        </div>
                        <div id="test-l-2" class="content">
                          <div class="form-group">

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-6">
                                  <label for="exampleInputBranchName" class="form-label">Branch Name</label>
                                  <input type="text" class="form-control" id="exampleInputBranchName" placeholder="Enter Company Name" />
                                </div>
                                <div class="col-md-6">
                                  <label for="exampleInputBranchType" class="form-label">Branch Type</label>
                                  <select class="form-select" id="branchTypeDropdown">
                                    <option value="" disabled selected>Select Branch Type</option>
                                    <option value="retail">Retail</option>
                                    <option value="corporate">Corporate</option>
                                    <option value="franchise">Franchise</option>
                                    <option value="other">Other</option>
                                  </select>
                                  <!-- <input type="text" class="form-control" id="exampleInputBranchType" placeholder="Enter Company Type" /> -->
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-12">
                                  <label for="exampleInputEmail1" class="form-label">Email address</label>
                                  <input type="email" class="form-control" id="exampleInputEmail1" placeholder="Enter Email" />
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-6">
                                  <label for="exampleInputMobile" class="form-label">Mobile</label>
                                  <input type="text" class="form-control" id="exampleInputMobile" placeholder="Enter Mobile no." />
                                </div>
                                <div class="col-md-6">
                                  <label for="exampleInputPhone" class="form-label">Phone</label>
                                  <input type="text" class="form-control" id="exampleInputPhone" placeholder="Enter Phone no." />
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-12">
                                  <label for="exampleInputAddress1" class="form-label">Address1</label>
                                  <input type="email" class="form-control" id="exampleInputAddress1" placeholder="Enter Address1" />
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-12">
                                  <label for="exampleInputAddress2" class="form-label">Address2</label>
                                  <input type="email" class="form-control" id="exampleInputAddress2" placeholder="Enter Address2" />
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-6">
                                  <label for="exampleInputCountry" class="form-label">Country</label>
                                  <select class="form-select" id="branchTypeDropdown">
                                    <option value="" disabled selected>Select Branch Type</option>
                                    <option value="retail">Retail</option>
                                    <option value="corporate">Corporate</option>
                                    <option value="franchise">Franchise</option>
                                    <option value="other">Other</option>
                                  </select>
                                </div>
                                <div class="col-md-6">
                                  <label for="exampleInputDiv1" class="form-label">Division1</label>
                                  <select class="form-select" id="branchTypeDropdown">
                                    <option value="" disabled selected>Select Branch Type</option>
                                    <option value="retail">Retail</option>
                                    <option value="corporate">Corporate</option>
                                    <option value="franchise">Franchise</option>
                                    <option value="other">Other</option>
                                  </select>
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-6">
                                  <label for="exampleInputDiv2" class="form-label">Division2</label>
                                  <select class="form-select" id="branchTypeDropdown">
                                    <option value="" disabled selected>Select Branch Type</option>
                                    <option value="retail">Retail</option>
                                    <option value="corporate">Corporate</option>
                                    <option value="franchise">Franchise</option>
                                    <option value="other">Other</option>
                                  </select>
                                </div>
                                <div class="col-md-6">
                                  <label for="exampleInputDiv3" class="form-label">Division3</label>
                                  <select class="form-select" id="branchTypeDropdown">
                                    <option value="" disabled selected>Select Branch Type</option>
                                    <option value="retail">Retail</option>
                                    <option value="corporate">Corporate</option>
                                    <option value="franchise">Franchise</option>
                                    <option value="other">Other</option>
                                  </select>
                                </div>
                              </div>
                            </div>

                            <div class="container mb-3">
                              <div class="row align-items-center">
                                <div class="col-md-6">
                                  <label for="exampleInputLocal" class="form-label">Locality</label>
                                  <input type="text" class="form-control" id="exampleInputLocal" placeholder="Enter Locality" />
                                </div>
                                <div class="col-md-6">
                                  <label for="exampleInputZipcode" class="form-label">Zipcode</label>
                                  <input type="text" class="form-control" id="exampleInputZipcode" placeholder="Enter Zipcode" />
                                </div>
                              </div>
                            </div>

                            

                            



                            <!-- <label for="exampleInputPassword1">Password</label>
                            <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password" /> -->
                          </div>
                          <div class="text-end">
                            <button (click)="next()" class="primary-btn">Next</button>
                          </div>
                        </div>
                        
                        <div id="test-l-3" class="content text-end">
                          <button type="submit" class="primary-btn mt-5">Submit</button>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>

      </div>
